name: Update Dashboard Data

on:
  schedule:
    # Run at 1:30 UTC (~7:00 AM IST) Tue-Sat — before next-day market open
    # at 9:15 AM IST, with buffer for GH Actions cron lag and Pages rebuild.
    # Captures the previous trading day's settled close (yfinance has NaN
    # Close until overnight, so same-evening runs miss the latest day).
    - cron: '30 1 * * 2-6'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data & update dashboard
        run: python fetch_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html dashboard_data.json
          git diff --staged --quiet || git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push
